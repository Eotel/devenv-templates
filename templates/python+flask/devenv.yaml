inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
    inputs:
      nixpkgs:
        follows: nixpkgs
  devenv-templates:
    url: github:Eotel/devenv-templates
    flake: false

cachix:
  enable: true
  caches:
    - nixpkgs-python
    - devenv
    - nix-community
